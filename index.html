<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 CBA 篮球信息概况</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
/* ============================================
   CSS Reset & Variables
   ============================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0d0d1a;
  --bg-secondary: #13132a;
  --bg-card: rgba(20, 20, 44, 0.85);
  --bg-card-hover: rgba(30, 30, 60, 0.92);
  --accent-orange: #ff6b35;
  --accent-red: #e63946;
  --accent-gold: #f4a261;
  --text-primary: #f0f0f0;
  --text-secondary: #a0a0b8;
  --text-muted: #6a6a82;
  --border-subtle: rgba(255, 255, 255, 0.06);
  --border-glow: rgba(255, 107, 53, 0.3);
  --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
  --shadow-glow: 0 0 30px rgba(255, 107, 53, 0.12);
  --radius-lg: 16px;
  --radius-md: 10px;
  --radius-sm: 6px;
  --font-mono: 'SF Mono', 'Monaco', 'Menlo', 'Consolas', monospace;
  --transition-fast: 0.18s ease;
  --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Court texture background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(255,107,53,0.04) 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.008) 40px, rgba(255,255,255,0.008) 41px),
    repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.005) 40px, rgba(255,255,255,0.005) 41px);
  pointer-events: none;
  z-index: 0;
}

/* ============================================
   Navigation
   ============================================ */
.nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(13, 13, 26, 0.92);
  backdrop-filter: blur(20px) saturate(140%);
  border-bottom: 1px solid var(--border-subtle);
  padding: 0 24px;
}

.nav-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--accent-orange);
  letter-spacing: 0.5px;
}

.nav-brand .icon { font-size: 1.5rem; }

.nav-tabs {
  display: flex;
  gap: 4px;
}

.nav-tab {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 0.88rem;
  font-weight: 500;
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition-fast);
  font-family: inherit;
  white-space: nowrap;
}

.nav-tab:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
.nav-tab.active {
  color: var(--accent-orange);
  background: rgba(255, 107, 53, 0.12);
}

/* ============================================
   Hero Section
   ============================================ */
.hero {
  position: relative;
  text-align: center;
  padding: 64px 24px 48px;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(255,107,53,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.hero h1 {
  font-size: 2.6rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent-orange), var(--accent-gold), var(--accent-red));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
  position: relative;
  z-index: 1;
}

.hero p {
  color: var(--text-secondary);
  font-size: 1.05rem;
  max-width: 500px;
  margin: 0 auto 24px;
  position: relative;
  z-index: 1;
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 32px;
  position: relative;
  z-index: 1;
}

.hero-stat {
  text-align: center;
}

.hero-stat .value {
  font-family: var(--font-mono);
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--accent-orange);
  display: block;
}

.hero-stat .label {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ============================================
   Main Container
   ============================================ */
.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px 60px;
  position: relative;
  z-index: 1;
}

/* ============================================
   Section Panel
   ============================================ */
.section {
  display: none;
  animation: fadeSlideIn 0.4s ease;
}

.section.active { display: block; }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ============================================
   Panel Header & Controls
   ============================================ */
.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}

.panel-header h2 {
  font-size: 1.35rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}

.control-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.btn {
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border-subtle);
  background: var(--bg-card);
  color: var(--text-secondary);
  transition: var(--transition-fast);
  font-family: inherit;
  white-space: nowrap;
}

.btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
.btn.active { background: rgba(255,107,53,0.15); color: var(--accent-orange); border-color: var(--border-glow); }
.btn-accent {
  background: linear-gradient(135deg, var(--accent-orange), #e85d28);
  color: #fff;
  border: none;
  font-weight: 600;
}

.btn-accent:hover { background: linear-gradient(135deg, #ff7f4d, #f06a32); color: #fff; }
.btn-accent:disabled { opacity: 0.5; cursor: not-allowed; }

.search-input {
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-subtle);
  background: var(--bg-card);
  color: var(--text-primary);
  font-size: 0.85rem;
  font-family: inherit;
  width: 200px;
  transition: var(--transition-fast);
}

.search-input:focus { outline: none; border-color: var(--border-glow); box-shadow: 0 0 0 3px rgba(255,107,53,0.08); }
.search-input::placeholder { color: var(--text-muted); }

/* ============================================
   Data Table (Players)
   ============================================ */
.data-table-wrapper {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border-subtle);
  overflow: hidden;
  box-shadow: var(--shadow-card);
}

.data-table {
  width: 100%;
  border-collapse: collapse;
}

.data-table thead th {
  padding: 14px 16px;
  text-align: left;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: rgba(0,0,0,0.25);
  border-bottom: 1px solid var(--border-subtle);
}

.data-table tbody td {
  padding: 12px 16px;
  font-size: 0.9rem;
  border-bottom: 1px solid var(--border-subtle);
  transition: var(--transition-fast);
}

.data-table tbody tr:hover td { background: rgba(255,107,53,0.04); }
.data-table tbody tr:last-child td { border-bottom: none; }

.rank-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  font-weight: 700;
  font-family: var(--font-mono);
  font-size: 0.82rem;
}

.rank-1 { background: linear-gradient(135deg, #ffd700, #ffb800); color: #1a1a2e; }
.rank-2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #1a1a2e; }
.rank-3 { background: linear-gradient(135deg, #cd7f32, #b87333); color: #fff; }
.rank-normal { background: rgba(255,255,255,0.08); color: var(--text-secondary); }

.player-name { font-weight: 600; color: var(--text-primary); }
.player-team { color: var(--text-muted); font-size: 0.8rem; }

.stat-highlight {
  font-family: var(--font-mono);
  font-weight: 700;
  color: var(--accent-orange);
  font-size: 1.05rem;
}

.stat-secondary {
  font-family: var(--font-mono);
  color: var(--text-secondary);
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-state .icon { font-size: 3rem; display: block; margin-bottom: 12px; }

/* ============================================
   Team Cards Grid
   ============================================ */
.team-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}

.team-card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 20px;
  transition: var(--transition-smooth);
  cursor: default;
}

.team-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-glow);
  transform: translateY(-2px);
  box-shadow: var(--shadow-glow);
}

.team-card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.team-logo {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  font-weight: 800;
  flex-shrink: 0;
}

.team-name {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-primary);
}

.team-city {
  font-size: 0.78rem;
  color: var(--text-muted);
}

.team-info {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.team-info-item {
  font-size: 0.78rem;
}

.team-info-item .label { color: var(--text-muted); display: block; font-size: 0.7rem; }
.team-info-item .value { color: var(--text-secondary); font-weight: 500; }

/* ============================================
   Charts Container
   ============================================ */
.charts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
  gap: 20px;
}

.chart-card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 24px;
  box-shadow: var(--shadow-card);
}

.chart-card h3 {
  font-size: 0.95rem;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text-secondary);
}

.chart-card canvas { max-height: 300px; }

/* ============================================
   Schedule Timeline
   ============================================ */
.schedule-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.schedule-item {
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 16px 20px;
  transition: var(--transition-fast);
}

.schedule-item:hover { background: var(--bg-card-hover); border-color: rgba(255,255,255,0.1); }

.schedule-date {
  font-family: var(--font-mono);
  font-size: 0.82rem;
  color: var(--text-muted);
  min-width: 90px;
  text-align: center;
}

.schedule-matchup {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
}

.schedule-team {
  font-weight: 600;
  font-size: 0.95rem;
  text-align: center;
  min-width: 80px;
}

.schedule-team.home { color: var(--text-primary); }
.schedule-team.away { color: var(--text-secondary); }

.schedule-vs {
  font-family: var(--font-mono);
  color: var(--text-muted);
  font-size: 0.85rem;
}

.schedule-score {
  font-family: var(--font-mono);
  font-weight: 800;
  font-size: 1.1rem;
  min-width: 70px;
  text-align: center;
}

.schedule-score .winner { color: var(--accent-orange); }
.schedule-score .loser { color: var(--text-muted); }
.schedule-score .upcoming { color: var(--text-muted); font-size: 0.85rem; }

.schedule-status {
  font-size: 0.72rem;
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 600;
  min-width: 56px;
  text-align: center;
}

.status-live { background: rgba(230,57,70,0.2); color: var(--accent-red); animation: pulse 2s infinite; }
.status-done { background: rgba(255,255,255,0.06); color: var(--text-muted); }
.status-upcoming { background: rgba(255,107,53,0.12); color: var(--accent-orange); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

/* ============================================
   Toast / Notification
   ============================================ */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(30, 30, 60, 0.95);
  border: 1px solid var(--border-glow);
  color: var(--text-primary);
  padding: 12px 24px;
  border-radius: var(--radius-md);
  font-size: 0.85rem;
  z-index: 200;
  opacity: 0;
  transition: var(--transition-smooth);
  backdrop-filter: blur(10px);
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ============================================
   Responsive
   ============================================ */
@media (max-width: 768px) {
  .hero h1 { font-size: 1.8rem; }
  .hero-stats { gap: 20px; }
  .hero-stat .value { font-size: 1.3rem; }

  .nav-inner { flex-direction: column; height: auto; padding: 12px 0; gap: 10px; }
  .nav-tabs { overflow-x: auto; width: 100%; justify-content: flex-start; }

  .panel-header { flex-direction: column; align-items: flex-start; }

  .data-table { font-size: 0.78rem; }
  .data-table thead th, .data-table tbody td { padding: 8px 6px; }

  .team-grid { grid-template-columns: 1fr; }
  .charts-grid { grid-template-columns: 1fr; }

  .schedule-item { flex-direction: column; align-items: center; gap: 8px; padding: 14px; }
  .schedule-matchup { flex-direction: column; gap: 6px; }

  .search-input { width: 140px; }
}

@media (max-width: 480px) {
  .container { padding: 0 12px 40px; }
  .nav { padding: 0 12px; }
  .nav-tab { padding: 6px 10px; font-size: 0.78rem; }
}
</style>
</head>
<body>

<!-- ============================================
     Navigation
     ============================================ -->
<nav class="nav">
  <div class="nav-inner">
    <div class="nav-brand">
      <span class="icon">🏀</span>
      <span>CBA 数据看板</span>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-section="players">球员数据</button>
      <button class="nav-tab" data-section="teams">球队信息</button>
      <button class="nav-tab" data-section="trends">数据趋势</button>
      <button class="nav-tab" data-section="schedule">赛程比分</button>
    </div>
  </div>
</nav>

<!-- ============================================
     Hero
     ============================================ -->
<header class="hero">
  <h1>中国男子篮球职业联赛</h1>
  <p>2023-2026 赛季 · 球员数据 · 球队信息 · 联赛趋势</p>
  <div class="hero-stats">
    <div class="hero-stat"><span class="value">3</span><span class="label">赛季覆盖</span></div>
    <div class="hero-stat"><span class="value">20</span><span class="label">CBA 球队</span></div>
    <div class="hero-stat"><span class="value">150+</span><span class="label">球员收录</span></div>
    <div class="hero-stat"><span class="value">5</span><span class="label">数据维度</span></div>
  </div>
</header>

<!-- ============================================
     Main Content
     ============================================ -->
<main class="container">

  <!-- =============================
       Section 1: 球员数据看板
       ============================= -->
  <section class="section active" id="section-players">
    <div class="panel-header">
      <h2>📊 球员数据看板</h2>
      <div class="control-bar">
        <input type="text" class="search-input" id="playerSearch" placeholder="搜索球员/球队...">
        <button class="btn active" data-season="2025-26">25-26</button>
        <button class="btn" data-season="2024-25">24-25</button>
        <button class="btn" data-season="2023-24">23-24</button>
        <select class="btn" id="statCategory" style="appearance:none;-webkit-appearance:none;cursor:pointer;">
          <option value="pts">得分</option>
          <option value="reb">篮板</option>
          <option value="ast">助攻</option>
          <option value="stl">抢断</option>
          <option value="blk">盖帽</option>
        </select>
        <button class="btn btn-accent" id="refreshPlayers">🔄 刷新数据</button>
      </div>
    </div>

    <div class="data-table-wrapper">
      <table class="data-table" id="playerTable">
        <thead>
          <tr>
            <th>#</th>
            <th>球员</th>
            <th>球队</th>
            <th>场均</th>
            <th>总数</th>
            <th>场次</th>
            <th>命中率</th>
          </tr>
        </thead>
        <tbody id="playerTableBody"></tbody>
      </table>
      <div class="empty-state" id="playerEmpty" style="display:none;">
        <span class="icon">🔍</span>
        <p>未找到匹配的球员数据</p>
      </div>
    </div>
  </section>

  <!-- =============================
       Section 2: 球队信息概览
       ============================= -->
  <section class="section" id="section-teams">
    <div class="panel-header">
      <h2>🏟️ 球队信息概览</h2>
      <div class="control-bar">
        <input type="text" class="search-input" id="teamSearch" placeholder="搜索球队...">
        <button class="btn btn-accent" id="refreshTeams">🔄 刷新数据</button>
      </div>
    </div>

    <div class="team-grid" id="teamGrid"></div>
    <div class="empty-state" id="teamEmpty" style="display:none;">
      <span class="icon">🔍</span>
      <p>未找到匹配的球队</p>
    </div>
  </section>

  <!-- =============================
       Section 3: 联赛数据趋势
       ============================= -->
  <section class="section" id="section-trends">
    <div class="panel-header">
      <h2>📈 联赛数据趋势</h2>
      <button class="btn btn-accent" id="refreshTrends">🔄 刷新分析</button>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <h3>近三年场均得分王数据变化</h3>
        <canvas id="chartScoring"></canvas>
      </div>
      <div class="chart-card">
        <h3>本土 vs 外援 — 得分王归属</h3>
        <canvas id="chartDomestic"></canvas>
      </div>
      <div class="chart-card">
        <h3>2025-26 赛季数据王雷达图</h3>
        <canvas id="chartRadar"></canvas>
      </div>
    </div>
  </section>

  <!-- =============================
       Section 4: 赛程与比分
       ============================= -->
  <section class="section" id="section-schedule">
    <div class="panel-header">
      <h2>📅 赛程与比分</h2>
      <div class="control-bar">
        <button class="btn btn-accent" id="refreshSchedule">🔄 搜索最新赛程</button>
      </div>
    </div>

    <div class="schedule-list" id="scheduleList"></div>
  </section>

</main>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ============================================
   CBA Data Store
   ============================================ */

   ============================================ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 2500);
}

const statLabels = { pts: '得分', reb: '篮板', ast: '助攻', stl: '抢断', blk: '盖帽' };
const statTotals = { pts: '总得分', reb: '总篮板', ast: '总助攻', stl: '总抢断', blk: '总盖帽' };

function getRankClass(i) {
  if (i === 0) return 'rank-1';
  if (i === 1) return 'rank-2';
  if (i === 2) return 'rank-3';
  return 'rank-normal';
}

function renderPlayers() {
  const tbody = document.getElementById('playerTableBody');
  const empty = document.getElementById('playerEmpty');
  const searchQuery = document.getElementById('playerSearch').value.toLowerCase();

  let players = [...(CBA_DATA[currentSeason]?.players || [])];

  // Sort by selected category descending
  players.sort((a, b) => (b[currentCategory] || 0) - (a[currentCategory] || 0));

  // Filter by search
  if (searchQuery) {
    players = players.filter(p =>
      p.name.toLowerCase().includes(searchQuery) ||
      p.team.toLowerCase().includes(searchQuery)
    );
  }

  if (players.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';

  tbody.innerHTML = players.map((p, i) => {
    const statVal = p[currentCategory];
    const statTotal = (statVal * p.gp).toFixed(0);
    return `
      <tr>
        <td><span class="rank-badge ${getRankClass(i)}">${i + 1}</span></td>
        <td><span class="player-name">${p.name}</span></td>
        <td><span class="player-team">${p.team}</span></td>
        <td><span class="stat-highlight">${statVal.toFixed(1)}</span></td>
        <td><span class="stat-secondary">${statTotal}</span></td>
        <td><span class="stat-secondary">${p.gp}</span></td>
        <td><span class="stat-secondary">${p.fgPct}</span></td>
      </tr>
    `;
  }).join('');
}

/* ============================================
   Section 4: Schedule
   ============================================ */
function renderSchedule() {
  const list = document.getElementById('scheduleList');

  list.innerHTML = SCHEDULE_DATA.map(g => {
    let scoreHtml = '';
    let statusHtml = '';

    if (g.status === 'done') {
      const hWin = g.homeScore > g.awayScore;
      scoreHtml = `<span class="${hWin ? 'winner' : 'loser'}">${g.homeScore}</span> - <span class="${hWin ? 'loser' : 'winner'}">${g.awayScore}</span>`;
      statusHtml = '<span class="schedule-status status-done">已结束</span>';
    } else {
      scoreHtml = '<span class="upcoming">vs</span>';
      statusHtml = '<span class="schedule-status status-upcoming">待进行</span>';
    }

    return `
      <div class="schedule-item">
        <span class="schedule-date">${g.date}</span>
        <div class="schedule-matchup">
          <span class="schedule-team home">${g.home}</span>
          <span class="schedule-score">${scoreHtml}</span>
          <span class="schedule-team away">${g.away}</span>
        </div>
        ${statusHtml}
      </div>
    `;
  }).join('');
}

document.getElementById('refreshSchedule').addEventListener('click', () => {
  const btn = document.getElementById('refreshSchedule');
  btn.disabled = true;
  btn.textContent = '⏳ 搜索中...';
  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = '🔄 搜索最新赛程';
    showToast('💡 在主会话中搜索 "CBA 2025-26赛季 季后赛赛程 最新比分" 即可更新');
  }, 1200);
});
